<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA-TRACKER COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .hidden { display: none !important; }
        
        .profile-icon {
            width: 50px !important; height: 50px !important;
            background: #2563eb; border: 3px solid #fff; border-radius: 50% 50% 50% 5px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: rotate(-45deg);
        }
        .profile-icon span { transform: rotate(45deg); display: block; font-size: 14px; }

        .admin-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="setup-section" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-slate-900 italic mb-2 tracking-tighter">JA-SYSTEM <span class="text-blue-600 font-bold">PRO</span></h1>
            <p class="text-[9px] font-black text-slate-400 tracking-[0.3em] uppercase mb-10">Real-Time Operations</p>
            <input type="text" id="user-id" placeholder="DIGITE SEU NOME" class="w-full p-5 bg-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/20 font-black text-center text-xl uppercase mb-4 transition-all border-none">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all">INICIAR SESSÃO</button>
        </div>
    </div>

    <div id="driver-section" class="hidden fixed inset-0 z-[1500] flex flex-col items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-slate-100">
            <div id="driver-avatar" class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black shadow-lg">?</div>
            <h2 id="driver-display-name" class="text-2xl font-black text-slate-800 uppercase mb-8 italic"></h2>
            <button onclick="toggleGPS()" id="btn-gps" class="w-full bg-emerald-500 text-white py-12 rounded-[2.5rem] font-black text-3xl shadow-2xl transition-all active:scale-95">LIGAR GPS</button>
        </div>
        <button onclick="location.reload()" class="mt-8 text-slate-400 font-bold text-xs uppercase tracking-widest">Desconectar</button>
    </div>

    <div id="admin-section" class="hidden flex h-screen w-screen overflow-hidden">
        <div class="admin-panel w-80 h-full z-[1000] flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-slate-900 text-lg italic tracking-tighter">COMANDO</h2>
                <span class="bg-emerald-100 text-emerald-600 text-[10px] font-black px-3 py-1 rounded-full animate-pulse">LIVE</span>
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Entregadores Ativos</h3>
                    <div id="driver-list" class="space-y-3">
                        </div>
                </div>

                <div class="pt-6 border-t border-slate-200">
                    <button onclick="clearHistory()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-100 transition-all mb-3">Limpar Histórico</button>
                    <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-200 transition-all">Sair do Sistema</button>
                </div>
            </div>
        </div>

        <div class="flex-1 relative">
            <div id="map"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFQCMsX04fwh7MVyEpvXnXD0U4TD5Or5w",
            authDomain: "ja-barbearia.firebaseapp.com",
            databaseURL: "https://ja-barbearia-default-rtdb.firebaseio.com",
            projectId: "ja-barbearia",
            messagingSenderId: "213237027963",
            appId: "1:213237027963:web:7d585b158ee06d3ab7fede"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", watchId = null, map, markers = {}, polylines = {}, activeFilters = {};

        window.startApp = () => {
            const input = document.getElementById('user-id');
            myName = input.value.trim().toUpperCase();
            if(!myName) return alert("Por favor, digite seu nome.");

            document.getElementById('setup-section').classList.add('hidden');
            
            if(myName === 'ADM') {
                document.getElementById('admin-section').classList.remove('hidden');
                initMap();
                monitor();
            } else {
                document.getElementById('driver-section').classList.remove('hidden');
                document.getElementById('driver-display-name').innerText = myName;
                document.getElementById('driver-avatar').innerText = myName.charAt(0);
            }
        };

        window.toggleGPS = () => {
            const btn = document.getElementById('btn-gps');
            if(!watchId) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now() };
                    set(ref(db, 'entregadores/' + myName), { ...coords, online: true });
                    push(ref(db, 'historico/' + myName), coords);
                    
                    btn.innerText = "PARAR GPS";
                    btn.classList.replace('bg-emerald-500', 'bg-red-500');
                }, (err) => alert("GPS Erro: " + err.message), { enableHighAccuracy: true });
            } else {
                update(ref(db, 'entregadores/' + myName), { online: false });
                navigator.geolocation.clearWatch(watchId); watchId = null;
                btn.innerText = "LIGAR GPS";
                btn.classList.replace('bg-red-500', 'bg-emerald-500');
            }
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([0,0], 2);
            L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);
        }

        function monitor() {
            onValue(ref(db, 'entregadores'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('driver-list');
                const bounds = L.latLngBounds();
                let hasActiveMarkers = false;

                list.innerHTML = "";
                
                for(let id in data) {
                    const d = data[id];
                    if(activeFilters[id] === undefined) activeFilters[id] = true;

                    if(activeFilters[id]) {
                        const icon = L.divIcon({
                            className: 'custom-icon',
                            html: `<div class="profile-icon"><span>${id.substring(0,2)}</span></div>`,
                            iconSize: [50, 50], iconAnchor: [25, 50]
                        });

                        if(markers[id]) markers[id].setLatLng([d.lat, d.lng]);
                        else markers[id] = L.marker([d.lat, d.lng], {icon}).addTo(map);

                        bounds.extend([d.lat, d.lng]);
                        hasActiveMarkers = true;

                        // Rastro
                        onValue(ref(db, 'historico/' + id), (hSnap) => {
                            const pts = [];
                            hSnap.forEach(p => pts.push([p.val().lat, p.val().lng]));
                            if(polylines[id]) polylines[id].setLatLngs(pts);
                            else polylines[id] = L.polyline(pts, {color: '#3b82f6', weight: 5, opacity: 0.5}).addTo(map);
                        });
                    } else {
                        if(markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                        if(polylines[id]) { map.removeLayer(polylines[id]); delete polylines[id]; }
                    }

                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <label class="flex items-center gap-3 cursor-pointer flex-1">
                                <input type="checkbox" ${activeFilters[id] ? 'checked' : ''} onchange="toggleFilter('${id}')" class="w-5 h-5 accent-blue-600 rounded">
                                <span class="font-black text-slate-800 text-[11px] uppercase">${id}</span>
                            </label>
                            <span class="w-2 h-2 rounded-full ${d.online ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}"></span>
                        </div>`;
                }

                if(hasActiveMarkers) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
            });
        }

        window.toggleFilter = (id) => {
            activeFilters[id] = !activeFilters[id];
            monitor();
        };

        window.clearHistory = () => {
            if(confirm("Limpar todos os rastros do mapa?")) {
                remove(ref(db, 'historico'));
                location.reload();
            }
        };
    </script>
</body>
</html>
