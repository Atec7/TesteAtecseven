<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA-TRACKER COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .hidden { display: none !important; }
        .profile-icon {
            width: 50px !important; height: 50px !important;
            background: #2563eb; border: 3px solid #fff; border-radius: 50% 50% 50% 5px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: rotate(-45deg); transition: all 0.1s linear;
        }
        .profile-icon span { transform: rotate(45deg); display: block; font-size: 14px; }
        .admin-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(0,0,0,0.1); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast-msg { background: #1e293b; color: white; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 11px; border-left: 5px solid #2563eb; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .copy-btn { background: #2563eb; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase; border: none; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="setup-section" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-slate-900 italic mb-2 tracking-tighter">JA-SYSTEM <span class="text-blue-600 font-bold">PRO</span></h1>
            <input type="text" id="user-id" placeholder="DIGITE SEU NOME" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-black text-center text-xl uppercase mb-4 border-none">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all">INICIAR SESSÃO</button>
        </div>
    </div>

    <div id="driver-section" class="hidden fixed inset-0 z-[1500] flex flex-col items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-slate-100">
            <div id="driver-avatar" class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">?</div>
            <h2 id="driver-display-name" class="text-2xl font-black text-slate-800 uppercase mb-8 italic"></h2>
            <button onclick="toggleGPS()" id="btn-gps" class="w-full bg-emerald-500 text-white py-12 rounded-[2.5rem] font-black text-3xl shadow-2xl active:scale-95">TESTAR</button>
            <div id="status-ativo" class="hidden w-full bg-blue-100 text-blue-600 py-8 rounded-[2.5rem] font-black text-xl uppercase animate-pulse">Monitoramento Ativo</div>
        </div>
    </div>

    <div id="admin-section" class="hidden flex h-screen w-screen overflow-hidden">
        <div class="admin-panel w-80 h-full z-[1000] flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-slate-900 text-lg italic tracking-tighter">COMANDO</h2>
                <button onclick="toggleMapStyle()" class="bg-slate-900 text-white text-[9px] px-2 py-1 rounded font-black uppercase">Mapa</button>
            </div>
            <input type="date" id="filter-date" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs mb-6 outline-none">
            <div class="space-y-4 flex-1">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entregadores Ativos</h3>
                <div id="driver-list" class="space-y-3"></div>
            </div>
            <div class="pt-6 border-t border-slate-200">
                <button onclick="clearHistoryByDate()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase mb-2">Limpar Histórico</button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-[10px] uppercase">Sair</button>
            </div>
        </div>
        <div class="flex-1 relative"><div id="map"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFQCMsX04fwh7MVyEpvXnXD0U4TD5Or5w",
            authDomain: "ja-barbearia.firebaseapp.com",
            databaseURL: "https://ja-barbearia-default-rtdb.firebaseio.com",
            projectId: "ja-barbearia"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", watchId = null, map, markers = {}, polylines = {}, activeRoutes = {}, lastStates = {};
        let screenOnTime = 0, screenOffTime = 0, lastScreenChange = Date.now();

        // PERSISTÊNCIA DO ENTREGADOR
        window.startApp = () => {
            const input = document.getElementById('user-id');
            myName = input.value.trim().toUpperCase();
            if(!myName) return;
            localStorage.setItem('ja_user', myName);
            document.getElementById('setup-section').classList.add('hidden');
            if(myName === 'ADM') {
                document.getElementById('admin-section').classList.remove('hidden');
                initMap(); monitor();
            } else {
                document.getElementById('driver-section').classList.remove('hidden');
                document.getElementById('driver-display-name').innerText = myName;
                document.getElementById('driver-avatar').innerText = myName.charAt(0);
                if(localStorage.getItem('gps_ativo') === 'true') toggleGPS();
            }
        };

        window.toggleGPS = () => {
            if(watchId) return;
            localStorage.setItem('gps_ativo', 'true');
            document.getElementById('btn-gps').classList.add('hidden');
            document.getElementById('status-ativo').classList.remove('hidden');

            watchId = navigator.geolocation.watchPosition((pos) => {
                const today = new Date().toISOString().split('T')[0];
                const data = { 
                    lat: pos.coords.latitude, lng: pos.coords.longitude, 
                    ts: Date.now(), date: today, speed: pos.coords.speed || 0,
                    screenOn: screenOnTime, screenOff: screenOffTime,
                    lastStatus: document.visibilityState
                };
                set(ref(db, 'entregadores/' + myName), { ...data, online: true });
                push(ref(db, 'historico/' + myName), data);
            }, null, { enableHighAccuracy: true, maximumAge: 0 });

            // Monitor de Tela
            document.addEventListener('visibilitychange', () => {
                const now = Date.now();
                const diff = now - lastScreenChange;
                if(document.visibilityState === 'hidden') screenOnTime += diff;
                else screenOffTime += diff;
                lastScreenChange = now;
                update(ref(db, 'entregadores/' + myName), { 
                    screenOn: screenOnTime, 
                    screenOff: screenOffTime,
                    lastStatus: document.visibilityState 
                });
            });
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-23.5, -46.6], 12);
            L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
        }

        function formatDuration(ms) {
            if(!ms) return "0s";
            const s = Math.floor((ms / 1000) % 60);
            const m = Math.floor((ms / 60000) % 60);
            const h = Math.floor(ms / 3600000);
            return `${h}h ${m}m ${s}s`;
        }

        function monitor() {
            onValue(ref(db, 'entregadores'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('driver-list');
                const bounds = L.latLngBounds();
                list.innerHTML = "";
                for(let id in data) {
                    const d = data[id];
                    const isMoving = d.speed > 0.3;
                    if(lastStates[id] !== undefined && lastStates[id] !== isMoving) {
                        spawnToast(isMoving ? `${id} em movimento` : `${id} parou`);
                    }
                    lastStates[id] = isMoving;

                    if(!markers[id]) {
                        markers[id] = L.marker([d.lat, d.lng]).addTo(map);
                        markers[id].on('click', () => showInfo(id, d));
                    } else { markers[id].setLatLng([d.lat, d.lng]); }
                    bounds.extend([d.lat, d.lng]);

                    list.innerHTML += `
                        <div class="p-3 bg-white rounded-xl border">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-black text-[10px] uppercase">${id}</span>
                                <span class="text-[8px] font-bold ${d.lastStatus==='hidden'?'text-red-500':'text-green-500'}">${d.lastStatus==='hidden'?'TELA OFF':'TELA ON'}</span>
                            </div>
                            <button onclick="window.toggleRoute('${id}')" class="w-full bg-blue-600 text-white text-[9px] p-2 rounded font-black uppercase">Ver Rota</button>
                        </div>`;
                }
                if(Object.keys(data || {}).length > 0) map.fitBounds(bounds, {padding:[50,50], maxZoom: 17});
            });
        }

        async function showInfo(id, d) {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${d.lat}&lon=${d.lng}`);
            const addr = (await res.json()).display_name || "Buscando...";
            const duration = formatDuration(Date.now() - d.ts);

            const content = `
                <div class="text-[10px] font-bold">
                    <b class="text-blue-600 uppercase">${id}</b><br>
                    <span>TEMPO NO PONTO:</span> ${duration}<br>
                    <hr class="my-2">
                    <span class="text-green-600">TELA LIGADA:</span> ${formatDuration(d.screenOn)}<br>
                    <span class="text-red-600">TELA APAGADA:</span> ${formatDuration(d.screenOff)}<br>
                    <hr class="my-2">
                    <span class="text-gray-400">${addr}</span>
                    <button onclick="navigator.clipboard.writeText('${addr}')" class="copy-btn">Copiar Endereço</button>
                </div>`;
            markers[id].bindPopup(content).openPopup();
        }

        function spawnToast(m) {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div');
            d.className = 'toast-msg'; d.innerText = m;
            c.appendChild(d); setTimeout(() => d.remove(), 3000);
        }

        window.toggleRoute = (id) => {
            const date = document.getElementById('filter-date').value;
            get(ref(db, 'historico/' + id)).then(s => {
                let pts = [];
                s.forEach(c => { if(c.val().date === date) pts.push([c.val().lat, c.val().lng]); });
                if(polylines[id]) map.removeLayer(polylines[id]);
                polylines[id] = L.polyline(pts, {color:'#2563eb', weight:4}).addTo(map);
            });
        };
    </script>
</body>
</html>
