<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA-TRACKER COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .hidden { display: none !important; }
        .profile-icon {
            width: 50px !important; height: 50px !important;
            background: #2563eb; border: 3px solid #fff; border-radius: 50% 50% 50% 5px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: rotate(-45deg); transition: all 0.2s linear;
        }
        .profile-icon span { transform: rotate(45deg); display: block; font-size: 14px; }
        .admin-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(0,0,0,0.1); }
        .copy-btn { background: #2563eb; color: white; padding: 8px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        #alert-box { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .toast { background: #1e293b; color: white; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 11px; animation: slide 0.3s ease; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="alert-box"></div>

    <div id="setup-section" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-slate-900 italic mb-2 tracking-tighter">JA-SYSTEM <span class="text-blue-600 font-bold">PRO</span></h1>
            <input type="text" id="user-id" placeholder="DIGITE SEU NOME" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-black text-center text-xl uppercase mb-4 border-none">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all">INICIAR SESSÃO</button>
        </div>
    </div>

    <div id="driver-section" class="hidden fixed inset-0 z-[1500] flex flex-col items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-slate-100">
            <div id="driver-avatar" class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black shadow-lg">?</div>
            <h2 id="driver-display-name" class="text-2xl font-black text-slate-800 uppercase mb-8 italic"></h2>
            <button onclick="toggleGPS()" id="btn-gps" class="w-full bg-emerald-500 text-white py-12 rounded-[2.5rem] font-black text-3xl shadow-2xl transition-all active:scale-95">TESTAR</button>
        </div>
        <button onclick="location.reload()" class="mt-8 text-slate-400 font-bold text-xs uppercase tracking-widest">RE#$7990</button>
    </div>

    <div id="admin-section" class="hidden flex h-screen w-screen overflow-hidden">
        <div class="admin-panel w-80 h-full z-[1000] flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-slate-900 text-lg italic tracking-tighter">COMANDO</h2>
                <button onclick="toggleMapStyle()" class="bg-slate-900 text-white text-[9px] px-2 py-1 rounded font-black">MAPA</button>
            </div>

            <input type="date" id="filter-date" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs mb-4 outline-none">

            <div class="space-y-4 flex-1">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entregadores Ativos</h3>
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <div class="pt-6 border-t border-slate-200">
                <button onclick="clearHistoryByDate()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase mb-2">Limpar Histórico Data</button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-[10px] uppercase">Sair</button>
            </div>
        </div>
        <div class="flex-1 relative"><div id="map"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFQCMsX04fwh7MVyEpvXnXD0U4TD5Or5w",
            authDomain: "ja-barbearia.firebaseapp.com",
            databaseURL: "https://ja-barbearia-default-rtdb.firebaseio.com",
            projectId: "ja-barbearia",
            messagingSenderId: "213237027963",
            appId: "1:213237027963:web:7d585b158ee06d3ab7fede"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", watchId = null, map, markers = {}, polylines = {}, activeRoutes = {};
        let mapStyles = ['http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'];
        let currentStyleIndex = 0, baseLayer;

        document.getElementById('filter-date').valueAsDate = new Date();

        window.startApp = () => {
            const input = document.getElementById('user-id');
            myName = input.value.trim().toUpperCase();
            if(!myName) return alert("Digite seu nome.");
            document.getElementById('setup-section').classList.add('hidden');
            if(myName === 'ADM') {
                document.getElementById('admin-section').classList.remove('hidden');
                initMap();
                monitor();
            } else {
                document.getElementById('driver-section').classList.remove('hidden');
                document.getElementById('driver-display-name').innerText = myName;
                document.getElementById('driver-avatar').innerText = myName.charAt(0);
            }
        };

        window.toggleGPS = () => {
            const btn = document.getElementById('btn-gps');
            if(!watchId) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const today = new Date().toISOString().split('T')[0];
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now(), date: today };
                    set(ref(db, 'entregadores/' + myName), { ...coords, online: true });
                    push(ref(db, 'historico/' + myName), coords);
                    btn.innerText = ".";
                }, null, { enableHighAccuracy: true, distanceFilter: 0 }); // Alta Precisão Total
            } else {
                update(ref(db, 'entregadores/' + myName), { online: false });
                navigator.geolocation.clearWatch(watchId); watchId = null;
                btn.innerText = "TESTAR";
            }
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-23.5, -46.6], 12);
            baseLayer = L.tileLayer(mapStyles[0], { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
        }

        window.toggleMapStyle = () => {
            currentStyleIndex = (currentStyleIndex + 1) % mapStyles.length;
            map.removeLayer(baseLayer);
            baseLayer = L.tileLayer(mapStyles[currentStyleIndex], { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
        };

        function monitor() {
            onValue(ref(db, 'entregadores'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('driver-list');
                const bounds = L.latLngBounds();
                let hasActive = false;
                list.innerHTML = "";

                for(let id in data) {
                    const d = data[id];
                    const icon = L.divIcon({ className: 'custom-icon', html: `<div class="profile-icon"><span>${id.substring(0,2)}</span></div>`, iconSize:[50,50], iconAnchor:[25,50] });

                    if(markers[id]) markers[id].setLatLng([d.lat, d.lng]);
                    else {
                        markers[id] = L.marker([d.lat, d.lng], {icon}).addTo(map);
                        markers[id].on('click', () => showInfo(id, d));
                    }
                    
                    bounds.extend([d.lat, d.lng]);
                    hasActive = true;

                    list.innerHTML += `
                        <div class="p-3 bg-white rounded-xl border shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-black text-[10px]">${id}</span>
                                <span class="w-2 h-2 rounded-full ${d.online?'bg-green-500':'bg-gray-300'}"></span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window.toggleRoute('${id}')" class="flex-1 bg-blue-600 text-white text-[8px] p-1 rounded font-bold">${activeRoutes[id]?'OCULTAR':'VER ROTA'}</button>
                                <button onclick="window.deleteUser('${id}')" class="bg-red-500 text-white text-[8px] p-1 rounded font-bold italic">X</button>
                            </div>
                        </div>`;
                    
                    if(activeRoutes[id]) loadRoute(id);
                }
                if(hasActive) map.fitBounds(bounds, {padding:[50,50], maxZoom: 17});
            });
        }

        async function showInfo(id, d) {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${d.lat}&lon=${d.lng}`);
            const addr = (await res.json()).display_name || "Buscando...";
            const timeDiff = Math.round((Date.now() - d.ts) / 60000);
            const timeTxt = timeDiff < 1 ? "Agora mesmo" : `Há ${timeDiff} min`;
            const gMaps = `https://www.google.com/maps?q=${d.lat},${d.lng}`;

            markers[id].bindPopup(`
                <div class="text-[10px] font-bold">
                    <b class="text-blue-600">${id}</b> está aqui ${timeTxt}<br><br>
                    ${addr}<br><br>
                    <a href="${gMaps}" target="_blank" class="text-blue-500 underline">Abrir no Maps</a>
                    <button onclick="navigator.clipboard.writeText('${id}: ${addr} | ${gMaps}'); alert('Copiado!')" class="copy-btn">Copiar Tudo</button>
                </div>
            `).openPopup();
        }

        window.toggleRoute = (id) => {
            activeRoutes[id] = !activeRoutes[id];
            if(!activeRoutes[id] && polylines[id]) { map.removeLayer(polylines[id]); delete polylines[id]; }
            monitor();
        };

        function loadRoute(id) {
            const date = document.getElementById('filter-date').value;
            onValue(ref(db, 'historico/' + id), (snap) => {
                let pts = [];
                snap.forEach(c => { if(c.val().date === date) pts.push([c.val().lat, c.val().lng]); });
                if(polylines[id]) polylines[id].setLatLngs(pts);
                else polylines[id] = L.polyline(pts, {color:'#2563eb', weight:4, opacity:0.6}).addTo(map);
            });
        }

        window.deleteUser = async (id) => {
            if(confirm(`DELETAR PERMANENTEMENTE ${id} e todos os seus dados?`)) {
                await remove(ref(db, 'entregadores/' + id));
                await remove(ref(db, 'historico/' + id));
                if(markers[id]) map.removeLayer(markers[id]);
                if(polylines[id]) map.removeLayer(polylines[id]);
                alert("Dados excluídos.");
            }
        };

        window.clearHistoryByDate = async () => {
            const date = document.getElementById('filter-date').value;
            if(!confirm(`Limpar todos os trajetos de ${date}?`)) return;
            const snap = await get(ref(db, 'historico'));
            snap.forEach(driver => {
                driver.forEach(entry => {
                    if(entry.val().date === date) remove(ref(db, `historico/${driver.key}/${entry.key}`));
                });
            });
            alert("Histórico do dia limpo.");
        };
    </script>
</body>
</html>
