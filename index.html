<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA-TRACKER COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .hidden { display: none !important; }
        
        .profile-icon {
            width: 50px !important; height: 50px !important;
            background: #2563eb; border: 3px solid #fff; border-radius: 50% 50% 50% 5px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: rotate(-45deg); transition: all 0.3s ease;
        }
        .profile-icon span { transform: rotate(45deg); display: block; font-size: 14px; }
        .moving { border-color: #10b981; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        .admin-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 5px; }
        .copy-btn { 
            background: #2563eb; color: white; border: none; padding: 8px; 
            border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer;
            font-weight: bold; font-size: 10px; text-transform: uppercase;
        }
        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .status-moving { background: #dcfce7; color: #166534; }
        .status-idle { background: #fee2e2; color: #991b1b; }

        #alert-box {
            position: fixed; top: 20px; right: 20px; z-index: 3000;
            pointer-events: none;
        }
        .toast {
            background: #1e293b; color: white; padding: 12px 20px; border-radius: 12px;
            margin-bottom: 8px; font-size: 12px; font-weight: bold; border-left: 4px solid #3b82f6;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="alert-box"></div>

    <div id="setup-section" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-slate-900 italic mb-2 tracking-tighter">JA-SYSTEM <span class="text-blue-600 font-bold">PRO</span></h1>
            <p class="text-[9px] font-black text-slate-400 tracking-[0.3em] uppercase mb-10">Real-Time Operations</p>
            <input type="text" id="user-id" placeholder="DIGITE SEU NOME" class="w-full p-5 bg-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/20 font-black text-center text-xl uppercase mb-4 transition-all border-none">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all">INICIAR SESSÃO</button>
        </div>
    </div>

    <div id="driver-section" class="hidden fixed inset-0 z-[1500] flex flex-col items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border border-slate-100">
            <div id="driver-avatar" class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black shadow-lg">?</div>
            <h2 id="driver-display-name" class="text-2xl font-black text-slate-800 uppercase mb-8 italic"></h2>
            <button onclick="toggleGPS()" id="btn-gps" class="w-full bg-emerald-500 text-white py-12 rounded-[2.5rem] font-black text-3xl shadow-2xl transition-all active:scale-95">TESTAR</button>
        </div>
        <button onclick="location.reload()" class="mt-8 text-slate-400 font-bold text-xs uppercase tracking-widest">SAIR</button>
    </div>

    <div id="admin-section" class="hidden flex h-screen w-screen overflow-hidden">
        <div class="admin-panel w-80 h-full z-[1000] flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-slate-900 text-lg italic tracking-tighter">COMANDO</h2>
                <button onclick="toggleMapStyle()" class="bg-slate-900 text-white text-[9px] px-3 py-1 rounded-lg font-black uppercase">Trocar Mapa</button>
            </div>

            <div class="mb-6">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2">Filtro de Data</label>
                <input type="date" id="filter-date" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs border-none outline-none">
            </div>

            <div class="space-y-4 flex-1">
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Monitoramento</h3>
                    <div id="driver-list" class="space-y-3"></div>
                </div>

                <div id="stats-panel" class="pt-4 border-t border-slate-100 hidden">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Indicadores (Hoje)</h3>
                    <div id="stats-content" class="text-[10px] font-bold text-slate-600 space-y-2"></div>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-200">
                <button onclick="clearHistoryByDate()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-red-100 transition-all mb-3">Limpar Data Selecionada</button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-200 transition-all">Sair do Sistema</button>
            </div>
        </div>

        <div class="flex-1 relative">
            <div id="map"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFQCMsX04fwh7MVyEpvXnXD0U4TD5Or5w",
            authDomain: "ja-barbearia.firebaseapp.com",
            databaseURL: "https://ja-barbearia-default-rtdb.firebaseio.com",
            projectId: "ja-barbearia",
            messagingSenderId: "213237027963",
            appId: "1:213237027963:web:7d585b158ee06d3ab7fede"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", watchId = null, map, markers = {}, polylines = {}, activeFilters = {};
        let mapStyles = [
            'http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
        ];
        let currentStyleIndex = 0;
        let baseLayer;

        // Inicia com a data de hoje
        document.getElementById('filter-date').valueAsDate = new Date();

        window.startApp = () => {
            const input = document.getElementById('user-id');
            myName = input.value.trim().toUpperCase();
            if(!myName) return alert("Por favor, digite seu nome.");
            document.getElementById('setup-section').classList.add('hidden');
            if(myName === 'ADM') {
                document.getElementById('admin-section').classList.remove('hidden');
                initMap();
                monitor();
            } else {
                document.getElementById('driver-section').classList.remove('hidden');
                document.getElementById('driver-display-name').innerText = myName;
                document.getElementById('driver-avatar').innerText = myName.charAt(0);
            }
        };

        window.toggleGPS = () => {
            const btn = document.getElementById('btn-gps');
            if(!watchId) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const today = new Date().toISOString().split('T')[0];
                    const coords = { 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude, 
                        ts: Date.now(), 
                        date: today,
                        speed: pos.coords.speed || 0 
                    };
                    set(ref(db, 'entregadores/' + myName), { ...coords, online: true });
                    push(ref(db, 'historico/' + myName), coords);
                    btn.innerText = "LIGADO";
                    btn.classList.replace('bg-emerald-500', 'bg-blue-600');
                }, (err) => alert("Erro GPS: " + err.message), { enableHighAccuracy: true });
            } else {
                update(ref(db, 'entregadores/' + myName), { online: false });
                navigator.geolocation.clearWatch(watchId); watchId = null;
                btn.innerText = "TESTAR";
                btn.classList.replace('bg-blue-600', 'bg-emerald-500');
            }
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([0,0], 2);
            baseLayer = L.tileLayer(mapStyles[currentStyleIndex], {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);
        }

        window.toggleMapStyle = () => {
            currentStyleIndex = (currentStyleIndex + 1) % mapStyles.length;
            map.removeLayer(baseLayer);
            baseLayer = L.tileLayer(mapStyles[currentStyleIndex], {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
            }).addTo(map);
        };

        function showToast(msg) {
            const box = document.getElementById('alert-box');
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            box.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        async function getSnapToRoads(points) {
            if(points.length < 2) return points;
            const coordStr = points.map(p => `${p[1]},${p[0]}`).join(';');
            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`);
                const data = await res.json();
                if(data.routes && data.routes[0]) {
                    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                }
            } catch(e) { return points; }
            return points;
        }

        function monitor() {
            const dateFilter = document.getElementById('filter-date');
            
            onValue(ref(db, 'entregadores'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('driver-list');
                list.innerHTML = "";

                for(let id in data) {
                    const d = data[id];
                    const isMoving = d.speed > 0.5;
                    if(activeFilters[id] === undefined) activeFilters[id] = true;

                    // Alerta de movimento em tempo real
                    if(markers[id] && markers[id].getLatLng().lat !== d.lat) {
                        showToast(`${id} está se movendo...`);
                    }

                    if(activeFilters[id]) {
                        const icon = L.divIcon({
                            className: 'custom-icon',
                            html: `<div class="profile-icon ${isMoving ? 'moving' : ''}"><span>${id.substring(0,2)}</span></div>`,
                            iconSize: [50, 50], iconAnchor: [25, 50]
                        });

                        if(markers[id]) markers[id].setLatLng([d.lat, d.lng]).setIcon(icon);
                        else {
                            markers[id] = L.marker([d.lat, d.lng], {icon}).addTo(map);
                            markers[id].on('click', () => showDetails(id, d));
                        }

                        // Lógica de Histórico e Estatísticas
                        const histQuery = query(ref(db, 'historico/' + id), orderByChild('date'), equalTo(dateFilter.value));
                        onValue(histQuery, async (hSnap) => {
                            let pts = [];
                            let idleTime = 0, moveTime = 0, lastTs = null, totalDist = 0;
                            
                            hSnap.forEach(p => {
                                const v = p.val();
                                pts.push([v.lat, v.lng]);
                                if(lastTs) {
                                    let diff = (v.ts - lastTs) / 1000 / 60; // min
                                    if(v.speed > 0.5) moveTime += diff; else idleTime += diff;
                                }
                                lastTs = v.ts;
                            });

                            const snappedPts = await getSnapToRoads(pts);
                            if(polylines[id]) polylines[id].setLatLngs(snappedPts);
                            else polylines[id] = L.polyline(snappedPts, {color: '#3b82f6', weight: 4}).addTo(map);

                            if(id === myName || Object.keys(data).length === 1 || activeFilters[id]) {
                                updateStats(id, idleTime, moveTime, pts.length);
                            }
                        });
                    }

                    list.innerHTML += `
                        <div class="p-3 bg-white rounded-xl border border-slate-100 shadow-sm">
                            <div class="flex items-center justify-between mb-2">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" ${activeFilters[id] ? 'checked' : ''} onchange="toggleFilter('${id}')" class="w-4 h-4 accent-blue-600">
                                    <span class="font-black text-slate-800 text-[10px] uppercase">${id}</span>
                                </label>
                                <span class="status-badge ${isMoving ? 'status-moving' : 'status-idle'}">${isMoving ? 'EM MOVIMENTO' : 'PARADO'}</span>
                            </div>
                        </div>`;
                }
            });
        }

        async function showDetails(id, d) {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${d.lat}&lon=${d.lng}`);
            const addr = (await res.json()).display_name || "Endereço não identificado";
            const gMaps = `https://www.google.com/maps?q=${d.lat},${d.lng}`;
            const text = `ENTREGADOR: ${id}\nSTATUS: ${d.speed > 0.5 ? 'Movimento' : 'Parado'}\nLOCAL: ${addr}\nLINK: ${gMaps}`;
            
            markers[id].bindPopup(`
                <div class="p-2 font-bold text-[10px]">
                    <p class="text-blue-600 mb-1">DETALHES DE ${id}</p>
                    <p class="text-slate-500 mb-2">${addr}</p>
                    <a href="${gMaps}" target="_blank" class="text-blue-500 underline">Abrir no Maps</a>
                    <button onclick="copyToClipboard('${text.replace(/'/g,"")}')" class="copy-btn">Copiar Info</button>
                </div>
            `).openPopup();
        }

        function updateStats(id, idle, move, count) {
            const panel = document.getElementById('stats-panel');
            const content = document.getElementById('stats-content');
            panel.classList.remove('hidden');
            content.innerHTML = `
                <div class="bg-slate-50 p-2 rounded-lg">
                    <p>🚚 Atividade: ${id}</p>
                    <p>🛑 Tempo Parado: ${idle.toFixed(1)} min</p>
                    <p>🛣️ Em Trânsito: ${move.toFixed(1)} min</p>
                    <p>📍 Pontos Coletados: ${count}</p>
                </div>
            `;
        }

        window.copyToClipboard = (t) => { navigator.clipboard.writeText(t); alert("Copiado!"); };
        
        window.toggleFilter = (id) => { activeFilters[id] = !activeFilters[id]; monitor(); };

        window.clearHistoryByDate = async () => {
            const date = document.getElementById('filter-date').value;
            if(!confirm(`Apagar histórico de ${date}?`)) return;
            
            const driversSnap = await get(ref(db, 'historico'));
            driversSnap.forEach(dSnap => {
                dSnap.forEach(hSnap => {
                    if(hSnap.val().date === date) remove(ref(db, `historico/${dSnap.key}/${hSnap.key}`));
                });
            });
            location.reload();
        };

        document.getElementById('filter-date').addEventListener('change', monitor);
    </script>
</body>
</html>
