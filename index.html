<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA-TRACKER COMMAND CENTER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #0b0d10; }
        
        .driver-marker-container { display: flex; flex-direction: column; align-items: center; }
        .driver-label { 
            background: #2563eb; color: #fff; padding: 2px 10px; border-radius: 20px;
            font-size: 10px; font-weight: 900; margin-bottom: 5px; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid white;
        }
        .profile-icon {
            width: 40px !important; height: 40px !important;
            background: #2563eb; border: 3px solid #fff; border-radius: 50% 50% 50% 5px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; transform: rotate(-45deg);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
        }
        .profile-icon span { transform: rotate(45deg); display: block; font-size: 12px; }

        .admin-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); z-index: 1000; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast-msg { 
            background: #1e293b; color: white; padding: 12px 20px; border-radius: 12px; 
            font-weight: 700; font-size: 11px; margin-bottom: 8px; border-left: 4px solid #10b981;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .copy-btn { background: #2563eb; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <audio id="bg-audio" loop><source src="data:audio/wav;base64,UklGRiQAAABXQVZFRm10IBAAAAABAAEARKwAAIhAAABAAgAZBkRhdGEAAAAA" type="audio/wav"></audio>

    <div id="setup-section" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-slate-900 italic mb-2 tracking-tighter">JA-SYSTEM <span class="text-blue-600 font-bold">PRO</span></h1>
            <input type="text" id="user-id" placeholder="SEU NOME" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-black text-center text-xl uppercase mb-4 border-none">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 transition-all">INICIAR SESSÃO</button>
        </div>
    </div>

    <div id="driver-section" class="hidden fixed inset-0 z-[1500] flex flex-col items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm bg-white p-10 rounded-[3.5rem] shadow-2xl text-center border">
            <div id="driver-avatar" class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">?</div>
            <h2 id="driver-display-name" class="text-2xl font-black text-slate-800 uppercase mb-8 italic"></h2>
            <button id="btn-gps" onclick="toggleGPS()" class="w-full bg-emerald-500 text-white py-12 rounded-[2.5rem] font-black text-3xl shadow-2xl active:scale-95">ATIVAR GPS</button>
            <div id="status-ativo" class="hidden w-full bg-slate-900 text-emerald-400 py-10 rounded-[2.5rem] font-black text-xl uppercase animate-pulse">🛰️ RASTREIO ATIVO</div>
            <p class="text-[10px] text-slate-400 font-bold mt-6 uppercase">O monitoramento funciona mesmo com a tela bloqueada.</p>
        </div>
    </div>

    <div id="admin-section" class="hidden flex h-screen w-screen overflow-hidden">
        <div class="admin-panel w-80 h-full flex flex-col p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-slate-900 text-xl italic tracking-tighter">COMANDO</h2>
                <button onclick="toggleMapStyle()" class="bg-slate-900 text-white text-[9px] px-2 py-1 rounded font-black uppercase">Mapa</button>
            </div>
            <input type="date" id="filter-date" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs mb-6 outline-none">
            
            <div class="space-y-4 flex-1" id="driver-list-container">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entregadores Ativos</h3>
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <div class="pt-6 border-t border-slate-200">
                <button onclick="clearHistoryByDate()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase mb-2">Limpar Histórico</button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-[10px] uppercase">Sair</button>
            </div>
        </div>
        <div class="flex-1 relative"><div id="map"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFQCMsX04fwh7MVyEpvXnXD0U4TD5Or5w",
            authDomain: "ja-barbearia.firebaseapp.com",
            databaseURL: "https://ja-barbearia-default-rtdb.firebaseio.com",
            projectId: "ja-barbearia"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", watchId = null, map, markers = {}, polylines = {}, activeRoutes = {}, lastStates = {};
        let screenOnStart = Date.now(), screenOffTotal = 0, screenOnTotal = 0;
        let mapStyles = ['http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'];
        let currentStyleIndex = 0, baseLayer;

        document.getElementById('filter-date').valueAsDate = new Date();

        window.startApp = () => {
            const input = document.getElementById('user-id');
            myName = input.value.trim().toUpperCase();
            if(!myName) return;
            document.getElementById('setup-section').classList.add('hidden');
            if(myName === 'ADM') {
                document.getElementById('admin-section').classList.remove('hidden');
                initMap(); monitor();
            } else {
                document.getElementById('driver-section').classList.remove('hidden');
                document.getElementById('driver-display-name').innerText = myName;
                document.getElementById('driver-avatar').innerText = myName.charAt(0);
            }
        };

        window.toggleGPS = () => {
            if(watchId) return;
            
            // Truque de áudio para manter processo vivo
            const audio = document.getElementById('bg-audio');
            audio.play().catch(() => {});

            // Solicitar Wake Lock para CPU não dormir
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }

            document.getElementById('btn-gps').classList.add('hidden');
            document.getElementById('status-ativo').classList.remove('hidden');

            watchId = navigator.geolocation.watchPosition((pos) => {
                const now = Date.now();
                const today = new Date().toISOString().split('T')[0];
                const stats = {
                    lat: pos.coords.latitude, lng: pos.coords.longitude,
                    ts: now, date: today, speed: pos.coords.speed || 0,
                    isLocked: document.visibilityState === 'hidden',
                    on: screenOnTotal, off: screenOffTotal
                };
                set(ref(db, 'entregadores/' + myName), { ...stats, online: true });
                push(ref(db, 'historico/' + myName), stats);
            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });

            document.addEventListener('visibilitychange', () => {
                const diff = Date.now() - screenOnStart;
                if (document.visibilityState === 'hidden') screenOnTotal += diff;
                else screenOffTotal += diff;
                screenOnStart = Date.now();
            });
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.5, -46.6], 12);
            baseLayer = L.tileLayer(mapStyles[0], { maxZoom: 21, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
        }

        window.toggleMapStyle = () => {
            currentStyleIndex = (currentStyleIndex + 1) % mapStyles.length;
            map.removeLayer(baseLayer);
            baseLayer = L.tileLayer(mapStyles[currentStyleIndex], { maxZoom: 21, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
        };

        function monitor() {
            onValue(ref(db, 'entregadores'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('driver-list');
                list.innerHTML = "";
                const bounds = L.latLngBounds();

                for(let id in data) {
                    const d = data[id];
                    const moving = d.speed > 0.5;

                    // Alertas Suaves
                    if(lastStates[id] !== undefined && lastStates[id] !== moving) {
                        spawnToast(moving ? `${id} iniciou deslocamento` : `${id} parou`);
                    }
                    lastStates[id] = moving;

                    const iconHtml = `<div class="driver-marker-container"><div class="driver-label">${id}</div><div class="profile-icon"><span>${id.substring(0,2)}</span></div></div>`;
                    const icon = L.divIcon({ className: '', html: iconHtml, iconSize:[40,60], iconAnchor:[20,60] });

                    if(!markers[id]) {
                        markers[id] = L.marker([d.lat, d.lng], {icon}).addTo(map);
                        markers[id].on('click', () => focusDriver(id));
                    } else {
                        markers[id].setLatLng([d.lat, d.lng]).setIcon(icon);
                    }
                    bounds.extend([d.lat, d.lng]);

                    list.innerHTML += `
                        <div class="p-3 bg-white rounded-xl border flex flex-col gap-2 shadow-sm">
                            <div class="flex justify-between items-center" onclick="window.focusDriver('${id}')">
                                <span class="font-black text-xs uppercase">${id}</span>
                                <span class="text-[8px] font-bold ${d.isLocked?'text-red-500':'text-green-500'}">${d.isLocked?'OFF':'TELA ON'}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="window.toggleRoute('${id}')" class="flex-1 bg-blue-600 text-white text-[8px] p-2 rounded font-black uppercase">Ver Rota</button>
                                <button onclick="window.deleteUser('${id}')" class="bg-red-500 text-white px-3 rounded font-black italic">X</button>
                            </div>
                        </div>`;
                    
                    if(activeRoutes[id]) updateLiveRoute(id);
                }
                if(Object.keys(data || {}).length > 0) map.fitBounds(bounds, {padding:[60,60], maxZoom: 18});
            });
        }

        window.focusDriver = (id) => {
            get(ref(db, 'entregadores/' + id)).then(snap => {
                const d = snap.val();
                map.flyTo([d.lat, d.lng], 18, { duration: 2 });
                showPopup(id, d);
            });
        };

        async function showPopup(id, d) {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${d.lat}&lon=${d.lng}`);
            const addr = (await res.json()).display_name || "Buscando endereço...";
            
            const timer = setInterval(() => {
                if(!markers[id].isPopupOpen()) return clearInterval(timer);
                const elapsed = Date.now() - d.ts;
                const h = Math.floor(elapsed/3600000);
                const m = Math.floor((elapsed%3600000)/60000);
                const s = Math.floor((elapsed%60000)/1000);

                const offH = Math.floor(d.off / 3600000);
                const offM = Math.floor((d.off % 3600000) / 60000);
                const offS = Math.floor((d.off % 60000) / 1000);

                markers[id].getPopup().setContent(`
                    <div class="p-1 font-bold text-[10px]">
                        <b class="text-blue-600 uppercase text-xs">${id}</b><br>
                        TEMPO AQUI: ${h}h ${m}m ${s}s<br>
                        <hr class="my-1">
                        📵 TELA BLOQUEADA: ${offH}h ${offM}m ${offS}s<br>
                        📍 ${addr}<br>
                        <button onclick="window.copyAll('${id}', '${addr}', ${d.lat}, ${d.lng})" class="copy-btn">Copiar Tudo</button>
                    </div>
                `);
            }, 1000);

            markers[id].bindPopup('...').openPopup();
        }

        window.copyAll = (id, addr, lat, lng) => {
            const link = `https://www.google.com/maps?q=$${lat},${lng}`;
            navigator.clipboard.writeText(`${id}\nLocal: ${addr}\nMaps: ${link}`);
            alert("Copiado!");
        };

        window.toggleRoute = (id) => {
            activeRoutes[id] = !activeRoutes[id];
            if(!activeRoutes[id] && polylines[id]) { map.removeLayer(polylines[id]); delete polylines[id]; }
            monitor();
        };

        function updateLiveRoute(id) {
            const date = document.getElementById('filter-date').value;
            get(ref(db, 'historico/' + id)).then(snap => {
                let pts = [];
                snap.forEach(c => { if(c.val().date === date) pts.push([c.val().lat, c.val().lng]); });
                if(polylines[id]) polylines[id].setLatLngs(pts);
                else polylines[id] = L.polyline(pts, {color:'#2563eb', weight:4, opacity:0.6}).addTo(map);
            });
        }

        window.deleteUser = async (id) => {
            if(confirm(`Deletar ${id} e histórico?`)) {
                await remove(ref(db, 'entregadores/' + id));
                await remove(ref(db, 'historico/' + id));
                location.reload();
            }
        };

        window.clearHistoryByDate = async () => {
            const date = document.getElementById('filter-date').value;
            if(!confirm(`Limpar ${date}?`)) return;
            const snap = await get(ref(db, 'historico'));
            snap.forEach(d => { d.forEach(e => { if(e.val().date === date) remove(ref(db, `historico/${d.key}/${e.key}`)); }); });
            alert("Limpo!");
        };

        function spawnToast(m) {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div');
            d.className = 'toast-msg'; d.innerText = m;
            c.appendChild(d); setTimeout(() => d.remove(), 4000);
        }
    </script>
</body>
    </html>
